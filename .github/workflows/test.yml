name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  unit:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v

  pinned-codex-contract:
    name: Codex CLI 0.144.1 contract
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --global @openai/codex@0.144.1
      - run: codex --version | grep '0.144.1'
      - run: codex exec --help > /dev/null
      - run: codex exec review --help > /dev/null
      - name: Validate bundled model catalog
        run: >-
          codex debug models --bundled |
          python3 -c 'import json,sys; data=json.load(sys.stdin); models={m["slug"]:m for m in data["models"]}; sol=models["gpt-5.6-sol"]; efforts={r["effort"] for r in sol["supported_reasoning_levels"]}; assert {"high","max","ultra"} <= efforts; assert sol["context_window"] >= 372000'
      - name: Validate developer Git in read-only sandbox
        if: runner.os == 'macOS'
        shell: bash
        run: |
          git_path="$(xcrun --find git)"
          codex sandbox -P :read-only -C "$GITHUB_WORKSPACE" "$git_path" status --short > /dev/null
          codex sandbox -P :read-only -C "$GITHUB_WORKSPACE" "$git_path" diff --stat > /dev/null

  latest-codex-canary:
    name: Latest stable Codex CLI canary
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --global @openai/codex@latest
      - run: codex --version
      - run: codex exec --help > /dev/null
      - run: codex exec review --help > /dev/null
      - name: Validate bundled model catalog
        run: >-
          codex debug models --bundled |
          python3 -c 'import json,sys; data=json.load(sys.stdin); models={m["slug"]:m for m in data["models"]}; sol=models["gpt-5.6-sol"]; assert sol["supported_reasoning_levels"]'
